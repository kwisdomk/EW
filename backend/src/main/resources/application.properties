# =============================================================================
# EpidermiWatch - Application Configuration
# Quarkus 3.15.x | H2 Persistent File | Java 17
# =============================================================================

# --- Datasource: H2 File-backed (persistent across restarts) ---
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/epidemiwatch;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# --- Hibernate ORM ---
# "update" preserves existing schema/data across restarts
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

# --- HTTP Server ---
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# --- CORS Configuration ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://localhost:8081
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin,x-api-key
quarkus.http.cors.exposed-headers=Content-Disposition,Location
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# --- Logging ---
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."com.epidemiwatch".level=DEBUG

# --- Dev Mode Overrides (file-backed in dev too — persistent) ---
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=false

# --- Security ---
# Loads from .env (EPIDEMIWATCH_API_KEY) or falls back to dev key
epidemiwatch.api.key=${EPIDEMIWATCH_API_KEY}

# Made with Bob
